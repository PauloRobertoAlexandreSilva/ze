<!DOCTYPE html>
<html lang="pt-br" dir="ltr">
<head>
    <title>Zé</title>

    <meta charset="UTF-8">
    <meta http-equiv="Content-type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta http-equiv="Content-Language" content="pt-BR">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="author" content="Paulo Roberto Alexandre da Silva">
    <meta name="description" content="Seu amigo Zé">
    <meta name="keywords" content="html, css, javascript, pwa, face-api, battery status, camera access">
    <meta name="theme-color" content="#0a0a0a">

    <meta name="application-name" content="Zé">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="full-screen" content="yes">
    <meta name="browsermode" content="application">
    <meta name="screen-orientation" content="portrait">

    <meta name="msapplication-TileImage" content="img/icon_512.png">
    <meta name="msapplication-TileColor" content="#0088D4">
    <meta name="msapplication-navbutton-color" content="#0088D4">
    <meta name="msapplication-tooltip" content="Zé">
    <meta name="msapplication-starturl" content=".">
    <meta name="msapplication-tap-highlight" content="no">

    <meta name="apple-mobile-web-app-capable"          content="yes"> <!-- Esconder interface do Safari -->
    <meta name="apple-mobile-web-app-title"            content="TEMPO">
    <meta name="apple-mobile-web-app-status-bar"       content="#0088D4">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-transparent">

    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="splash-logo"></div>

    <main id="app-container">

        <header id="status-bar" class="hidden">
            <div class="status-item" id="battery-status">
                <span id="hunger-icon">⚡</span> <span id="battery-level">--%</span>
            </div>

            <div id="buttons">
                <button id="buttonInstallApp">❤️</button>
                <button id="buttonShare">👍</button>
            </div>
        </header>

        <!-- Formulário inicial -->
        <div id="onboarding-form" class="hidden">
            <input type="text" id="input-nome" placeholder="Seu nome" autocomplete="off">
            <input type="number" id="input-idade" placeholder="Sua idade">
            <button id="btn-salvar">Confirmar</button>
        </div>

        <!-- Rosto do Zé -->
        <div id="Ze-face" class="hidden">
            <div class="eye left"><div class="pupil"></div></div>
            <div class="eye right"><div class="pupil"></div></div>
        </div>

        <h1 id="greeting-text"></h1>
    </main>

    <div class="camera-preview">
        <video id="video" autoplay muted></video>
    </div>

    <!-- Bibliotecas e Scripts -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="scr/install.js"></script>
    <script src="scr/share.js"></script>
    <script src="scr/script.js"></script>
</body>
</html>
